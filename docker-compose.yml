version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: table-order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: table_order_nexon
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: table-order-backend
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: password
      DB_DATABASE: table_order_nexon
      JWT_SECRET: docker-dev-secret-key
      JWT_TABLE_EXPIRES_IN: 24h
      JWT_ADMIN_EXPIRES_IN: 16h
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 5242880
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
